substitutions:
  _REGION: us-central1
  _SERVICE: airframe
  _AR_REPO: airframe
  _JWT_SECRET_NAME: airframe-jwt-secret

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: ensure-artifact-registry
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud artifacts repositories describe "${_AR_REPO}" --location="${_REGION}" >/dev/null 2>&1 ||
          gcloud artifacts repositories create "${_AR_REPO}" \
            --repository-format=docker \
            --location="${_REGION}" \
            --description="Airframe container images"

  - id: ensure-jwt-secret
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud secrets describe "${_JWT_SECRET_NAME}" >/dev/null 2>&1 || {
          python3 -c 'import secrets; print(secrets.token_urlsafe(48), end="")' |
            gcloud secrets create "${_JWT_SECRET_NAME}" \
              --replication-policy=automatic \
              --data-file=-
        }

  - id: allow-cloud-run-secret-access
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        PROJECT_NUMBER="$$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')"
        RUNTIME_SERVICE_ACCOUNT="$${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
        gcloud secrets add-iam-policy-binding "${_JWT_SECRET_NAME}" \
          --member="serviceAccount:$${RUNTIME_SERVICE_ACCOUNT}" \
          --role="roles/secretmanager.secretAccessor" \
          --quiet >/dev/null

  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --set-env-vars=NODE_ENV=production,AIRFRAME_DB_PATH=/tmp/airframe/database.json
      - --set-secrets=JWT_SECRET=${_JWT_SECRET_NAME}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
